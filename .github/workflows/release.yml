name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: "release hpi"
    steps:
      - name: Build
        uses: offa/maven-action@6ae95407e3764dbe8a6402cc485cb46702320fe0
        with:
          java-version: 21
          pmd: false
      - name: Checksum
        run: |
          cd target/
          for f in maintenance-mode-*.hpi; do sha256sum "$f" | tee "$f.sha256"; done
      - name: Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        if: github.ref_type == 'tag'
        with:
          files: |
            target/maintenance-mode-*.hpi
            target/maintenance-mode-*.hpi.sha256
